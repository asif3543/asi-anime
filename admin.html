<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASI Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>
    <style>
        /* Modern Dark Theme CSS */
        :root {
            --bg-color: #121212;
            --box-bg: #1e1e1e;
            --primary: #ff4500;
            --primary-hover: #e03e00;
            --text-color: #ffffff;
            --border: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .admin-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .admin-title {
            text-align: center;
            color: var(--primary);
            margin-bottom: 30px;
            font-size: 28px;
        }

        .box {
            background-color: var(--box-bg);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
        }

        .box h3 {
            margin-top: 0;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
            color: var(--primary);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            background: #2a2a2a;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        .delete-btn {
            background-color: #d32f2f;
        }
        .delete-btn:hover {
            background-color: #b71c1c;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .preview-img {
            max-width: 150px;
            border-radius: 8px;
            margin: 10px auto;
            display: block;
        }

        /* Episode List Styles */
        .ep-list {
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
            background: #2a2a2a;
            border-radius: 6px;
            padding: 10px;
        }
        .ep-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e1e1e;
            padding: 8px 12px;
            margin-bottom: 8px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }
        .ep-item button {
            width: auto;
            padding: 5px 10px;
            font-size: 12px;
            background: #d32f2f;
        }
    </style>
</head>

<body>

<div class="admin-container">
    <h2 class="admin-title">🔥 ASI Admin Panel</h2>

    <!-- LOGIN BOX -->
    <div class="box" id="loginBox">
        <input type="password" id="adminPass" placeholder="Enter Admin Password">
        <p style="text-align:center; font-size:12px; color:gray;">Type password to auto-login</p>
    </div>

    <div id="adminPanel" style="display:none">

        <!-- ADD ANIME -->
        <div class="box">
            <h3>🎬 Add New Anime</h3>
            
            <input id="newName" placeholder="Anime Name (e.g., Naruto)">
            
            <div class="grid-2">
                <input id="newSeason" placeholder="Season (e.g., 1)">
                <input id="newYear" type="number" placeholder="Release Year (e.g., 2024)">
            </div>

            <div class="grid-2">
                <input id="newGenre" placeholder="Genre (Action, Romance, etc.)">
                <select id="newStatus">
                    <option value="Ongoing">Ongoing</option>
                    <option value="Completed">Completed</option>
                </select>
            </div>

            <select id="newType">
                <option value="sub">Hindi Sub</option>
                <option value="dub">Hindi Dub</option>
            </select>

            <textarea id="newDesc" placeholder="Anime Description"></textarea>

            <button id="uploadImgBtn" type="button">📸 Select Image</button>
            <p id="imgText" style="text-align:center;color:#ff4500;margin-top:10px;">No Image Selected</p>
            <img id="imgPreview" class="preview-img" style="display:none;">

            <button id="addAnimeBtn" style="margin-top: 15px;">Save Anime</button>
        </div>

        <!-- ADD & MANAGE EPISODES -->
        <div class="box">
            <h3>📺 Add & Manage Episodes</h3>

            <select id="animeSelect">
                <option value="">Select Anime</option>
            </select>

            <div class="grid-2">
                <input id="epNum" type="number" placeholder="Episode Number">
                <input id="epLink" placeholder="Episode Link (URL)">
            </div>

            <button id="addEpBtn">Add Episode</button>

            <!-- Show Existing Episodes here -->
            <div id="existingEpisodesBox" style="display:none; margin-top: 20px;">
                <h4 style="color: #ff4500; margin-bottom: 5px; border-bottom: none;">Current Episodes</h4>
                <div id="episodesContainer" class="ep-list">
                    <!-- Episodes will load here -->
                </div>
            </div>
        </div>

        <!-- DELETE ANIME -->
        <div class="box">
            <h3>🗑️ Delete Anime</h3>

            <select id="deleteSelect">
                <option value="">Select Anime to Delete</option>
            </select>

            <button id="deleteAnimeBtn" class="delete-btn">Delete Entire Anime</button>
        </div>

    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import {
        getFirestore, collection, addDoc, getDoc,
        getDocs, doc, updateDoc,
        deleteDoc, arrayUnion, arrayRemove
    } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

    // Firebase Configuration
    const app = initializeApp({
        apiKey: "AIzaSyA8Z3CvFTL402UF_6y9v1iWLP8e_kZo1Q",
        authDomain: "asi-anime.firebaseapp.com",
        projectId: "asi-anime"
    });

    const db = getFirestore(app);
    let uploadedImage = "";
    let currentEpisodesList =[];
    let selectedAnimeId = "";

    /* LOGIN LOGIC */
    const adminPassInput = document.getElementById("adminPass");
    adminPassInput.addEventListener("input", () => {
        if(adminPassInput.value === "Animestudioio786") {
            document.getElementById("adminPanel").style.display = "block";
            document.getElementById("loginBox").style.display = "none";
            loadList();
        }
    });

    /* LOAD ANIME LIST */
    async function loadList() {
        try {
            const snap = await getDocs(collection(db, "anime"));
            const animeSelect = document.getElementById("animeSelect");
            const deleteSelect = document.getElementById("deleteSelect");

            animeSelect.innerHTML = "<option value=''>Select Anime</option>";
            deleteSelect.innerHTML = "<option value=''>Select Anime to Delete</option>";

            let list =[];
            snap.forEach(d => list.push({ id: d.id, ...d.data() }));
            
            // Sort A-Z
            list.sort((a, b) => (a.name || "").localeCompare(b.name || ""));

            list.forEach(a => {
                let opt1 = document.createElement("option");
                opt1.value = a.id;
                opt1.textContent = a.name;
                animeSelect.appendChild(opt1);

                let opt2 = document.createElement("option");
                opt2.value = a.id;
                opt2.textContent = a.name;
                deleteSelect.appendChild(opt2);
            });
        } catch (error) {
            console.error("Error loading anime list:", error);
        }
    }

    /* CLOUDINARY UPLOAD */
    document.getElementById("uploadImgBtn").onclick = () => {
        let widget = cloudinary.createUploadWidget({
            cloudName: "dmxqosmk0",
            uploadPreset: "asi_anime_upload",
            cropping: false,
            multiple: false
        }, (error, result) => {
            if (!error && result && result.event === "success") {
                uploadedImage = result.info.secure_url;
                
                const imgText = document.getElementById("imgText");
                const imgPreview = document.getElementById("imgPreview");
                
                imgText.innerText = "Image Uploaded Successfully ✅";
                imgText.style.color = "#00ff00";
                
                imgPreview.src = uploadedImage;
                imgPreview.style.display = "block";
            }
        });
        widget.open();
    };

    /* ADD ANIME */
    document.getElementById("addAnimeBtn").onclick = async () => {
        let name = document.getElementById("newName").value.trim();
        const btn = document.getElementById("addAnimeBtn");

        if (!name || !uploadedImage) {
            alert("Please fill Anime Name and Upload an Image.");
            return;
        }

        try {
            btn.innerText = "Saving...";
            btn.disabled = true;

            await addDoc(collection(db, "anime"), {
                name: name,
                season: document.getElementById("newSeason").value || "1",
                year: document.getElementById("newYear").value || new Date().getFullYear(),
                genre: document.getElementById("newGenre").value,
                status: document.getElementById("newStatus").value,
                type: document.getElementById("newType").value,
                description: document.getElementById("newDesc").value,
                image: uploadedImage,
                episodes:[],
                updatedAt: Date.now()
            });

            alert("Anime Added Successfully ✅");
            
            // Clear Form
            document.getElementById("newName").value = "";
            document.getElementById("newSeason").value = "";
            document.getElementById("newYear").value = "";
            document.getElementById("newGenre").value = "";
            document.getElementById("newDesc").value = "";
            uploadedImage = "";
            document.getElementById("imgPreview").style.display = "none";
            document.getElementById("imgText").innerText = "No Image Selected";
            document.getElementById("imgText").style.color = "#ff4500";
            
            loadList(); // Refresh list automatically

        } catch (error) {
            alert("Error adding anime: " + error.message);
        } finally {
            btn.innerText = "Save Anime";
            btn.disabled = false;
        }
    };

    /* FETCH EPISODES WHEN ANIME SELECTED */
    document.getElementById("animeSelect").onchange = async (e) => {
        selectedAnimeId = e.target.value;
        const epBox = document.getElementById("existingEpisodesBox");
        
        if(!selectedAnimeId) {
            epBox.style.display = "none";
            return;
        }
        fetchEpisodes(selectedAnimeId);
    };

    /* FUNCTION TO FETCH & SHOW EPISODES */
    async function fetchEpisodes(animeId) {
        const epBox = document.getElementById("existingEpisodesBox");
        const epContainer = document.getElementById("episodesContainer");
        
        epContainer.innerHTML = "<p style='color:white;'>Loading episodes...</p>";
        epBox.style.display = "block";

        const docSnap = await getDoc(doc(db, "anime", animeId));
        if(docSnap.exists()){
            currentEpisodesList = docSnap.data().episodes ||[];
            renderEpisodes();
        }
    }

    /* RENDER EPISODES ON SCREEN */
    function renderEpisodes() {
        const epContainer = document.getElementById("episodesContainer");
        epContainer.innerHTML = "";

        if(currentEpisodesList.length === 0) {
            epContainer.innerHTML = "<p style='color:gray;'>No episodes available yet.</p>";
            return;
        }

        // Sort episodes by number if possible
        currentEpisodesList.sort((a,b) => Number(a.ep) - Number(b.ep));

        currentEpisodesList.forEach((epObj, index) => {
            let div = document.createElement("div");
            div.className = "ep-item";
            div.innerHTML = `
                <span>Ep ${epObj.ep}</span> 
                <button data-index="${index}" class="delete-ep-btn">Delete</button>
            `;
            epContainer.appendChild(div);
        });

        // Add Delete Event to Episode Buttons
        document.querySelectorAll(".delete-ep-btn").forEach(btn => {
            btn.onclick = async (e) => {
                let idx = e.target.getAttribute("data-index");
                let epToDelete = currentEpisodesList[idx];
                
                if(confirm(`Are you sure you want to delete Episode ${epToDelete.ep}?`)){
                    e.target.innerText = "Wait...";
                    try {
                        await updateDoc(doc(db, "anime", selectedAnimeId), {
                            episodes: arrayRemove(epToDelete)
                        });
                        fetchEpisodes(selectedAnimeId); // Refresh episodes
                    } catch(err) {
                        alert("Error deleting episode.");
                    }
                }
            };
        });
    }

    /* ADD EPISODE */
    document.getElementById("addEpBtn").onclick = async () => {
        let ep = document.getElementById("epNum").value.trim();
        let link = document.getElementById("epLink").value.trim();

        if(!selectedAnimeId) {
            alert("Please select an Anime first.");
            return;
        }
        if(!ep || !link){
            alert("Fill Episode Number and Link");
            return;
        }

        if(!link.match(/^https?:\/\//i)){
            link = "https://" + link;
        }

        const btn = document.getElementById("addEpBtn");
        btn.innerText = "Adding...";
        btn.disabled = true;

        try {
            await updateDoc(doc(db, "anime", selectedAnimeId), {
                episodes: arrayUnion({ ep, link }),
                updatedAt: Date.now()
            });

            alert("Episode Added ✅");
            document.getElementById("epNum").value = "";
            document.getElementById("epLink").value = "";
            
            fetchEpisodes(selectedAnimeId); // Refresh episodes instantly
        } catch(err) {
            alert("Error adding episode: " + err.message);
        } finally {
            btn.innerText = "Add Episode";
            btn.disabled = false;
        }
    };

    /* DELETE ANIME */
    document.getElementById("deleteAnimeBtn").onclick = async () => {
        let deleteSelect = document.getElementById("deleteSelect");
        let id = deleteSelect.value;

        if(!id){
            alert("Select an Anime to delete.");
            return;
        }

        if(confirm("⚠️ Are you sure you want to delete this ENTIRE anime? This action cannot be undone.")){
            const btn = document.getElementById("deleteAnimeBtn");
            btn.innerText = "Deleting...";
            btn.disabled = true;

            try {
                await deleteDoc(doc(db, "anime", id));
                alert("Anime Deleted ✅");
                loadList(); // Refresh lists
            } catch(err) {
                alert("Error deleting anime: " + err.message);
            } finally {
                btn.innerText = "Delete Entire Anime";
                btn.disabled = false;
                deleteSelect.value = "";
            }
        }
    };

</script>
</body>
</html>
