<!DOCTYPE html>
<html>
<head>
<title>ASI Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<h2>Upload Anime</h2>

<input type="text" id="name" placeholder="Anime Name"><br><br>
<input type="text" id="genre" placeholder="Genre"><br><br>
<input type="text" id="link" placeholder="Short Link"><br><br>

<button onclick="openUpload()">Select Image & Upload</button>

<p id="imgUrl"></p>

<br>

<button onclick="saveData()">Save Anime Data</button>

<p id="status"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyA8Z3CvFTL402UF_6zY9v2iWLP8e_kZo1Q",
authDomain:"asi-anime.firebaseapp.com",
projectId:"asi-anime"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let uploadedImage="";

window.saveData = async function(){

let name=document.getElementById("name").value;
let genre=document.getElementById("genre").value;
let link=document.getElementById("link").value;

if(!uploadedImage){
alert("Image upload karo");
return;
}

await addDoc(collection(db,"anime"),{
name,
genre,
link,
image:uploadedImage
});

document.getElementById("status").innerText="Saved ✅";

}

</script>

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<script>
window.openUpload = function(){

let widget = cloudinary.createUploadWidget({
cloudName:"dmxqosmk0",
uploadPreset:"asi_anime_upload"
},
(error,result)=>{
if(!error && result && result.event==="success"){
uploadedImage=result.info.secure_url;
document.getElementById("imgUrl").innerText="Image Uploaded ✅";
}
});

widget.open();
}
</script>

</body>
</html>
