<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ASI Admin</title>

<style>
body{
background:#121212;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.box{
background:#1e1e1e;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
margin-bottom:25px;
}

input,select,textarea{
width:90%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
background:#333;
color:white;
}

button{
padding:12px;
width:95%;
margin-top:10px;
background:#ff4500;
color:white;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<h2>🔐 ASI Admin Panel</h2>

<input type="password" id="adminPass" placeholder="Enter Password">

<div id="adminPanel" style="display:none">

<h3>Add New Anime</h3>

<div class="box">
<input id="newName" placeholder="Anime Name">
<input id="newImg" placeholder="Image URL">
<input id="newGenre" placeholder="Genre">

<select id="newType">
<option value="sub">Hindi Sub</option>
<option value="dub">Hindi Dub</option>
</select>

<textarea id="newDesc" placeholder="Description"></textarea>

<button id="addAnimeBtn">Add Anime</button>
</div>

<h3>Add Episode</h3>

<div class="box">
<select id="animeSelect"></select>
<input id="epNum" placeholder="Episode Number">
<input id="epLink" placeholder="Episode Link">
<button id="addEpBtn">Save Episode</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, arrayUnion } 
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const app=initializeApp({
apiKey:"AIzaSyA8Z3CvFTL402UF_6y9v1iWLP8e_kZo1Q",
authDomain:"asi-anime.firebaseapp.com",
projectId:"asi-anime"
});

const db=getFirestore(app);

/* Password */
const passInput=document.getElementById("adminPass");
const adminPanel=document.getElementById("adminPanel");

passInput.addEventListener("input",()=>{
if(passInput.value==="Animestudioio786"){
adminPanel.style.display="block";
}else{
adminPanel.style.display="none";
}
});

/* Load Anime List */
async function loadList(){
const snap=await getDocs(collection(db,"anime"));

const sel=document.getElementById("animeSelect");
sel.innerHTML="<option value=''>Select Anime</option>";

snap.forEach(d=>{
let opt=document.createElement("option");
opt.value=d.id;
opt.textContent=d.data().name;
sel.appendChild(opt);
});
}

/* Add New Anime */
document.getElementById("addAnimeBtn").onclick=async()=>{

let name=newName.value;
let img=newImg.value;
let genre=newGenre.value;
let type=newType.value;
let desc=newDesc.value;

if(!name || !img) return alert("Fill Name + Image");

await addDoc(collection(db,"anime"),{
name,img,genre,type,description:desc,episodes:[]
});

alert("Anime Added ✅");
loadList();
};

/* Add Episode */
document.getElementById("addEpBtn").onclick=async()=>{

let id=animeSelect.value;
let ep=epNum.value;
let link=epLink.value;

if(!id || !ep || !link) return alert("Fill All Fields");

await updateDoc(doc(db,"anime",id),{
episodes:arrayUnion({ep,link})
});

alert("Episode Saved ✅");

epNum.value="";
epLink.value="";
};

loadList();

</script>

</body>
</html>
