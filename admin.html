<!DOCTYPE html>
<html>
<head>
<title>ASI Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#121212;
color:white;
text-align:center;
padding:20px;
}

input,select{
padding:12px;
width:80%;
max-width:400px;
margin:8px auto;
border-radius:6px;
border:none;
display:block;
}

button{
padding:12px 20px;
margin:10px;
background:#ff4500;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#e03e00;
}

h3{
color:#ff9800;
margin-top:40px;
}
</style>

</head>

<body>

<h2>🔐 ASI Admin Panel</h2>

<input type="password" id="adminPass" placeholder="Enter Password">

<div id="adminPanel" style="display:none">

<h3>🟢 Add New Anime</h3>

<input id="newName" placeholder="Anime Name">
<input id="newGenre" placeholder="Genre">
<input id="newLink" placeholder="Anime Redirect Link">

<button id="uploadImgBtn">📸 Upload Image</button>
<p id="imgText">No Image</p>

<button id="addAnimeBtn">💾 Save New Anime</button>

<hr>

<h3>🔴 Add Episode</h3>

<select id="animeSelect">
<option value="">Select Anime</option>
</select>

<input id="episode" placeholder="Episode Number">
<input id="episodeLink" placeholder="Episode Link">

<button id="saveEpisodeBtn">Save Episode</button>

<p id="status"></p>

</div>

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, arrayUnion } 
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyA8Z3CvFTL402UF_6y9v1iWLP8e_kZo1Q",
authDomain:"asi-anime.firebaseapp.com",
projectId:"asi-anime"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let uploadedImage="";

/* Password Check */
const passInput=document.getElementById("adminPass");
const adminPanel=document.getElementById("adminPanel");

passInput.addEventListener("input",()=>{
if(passInput.value==="Animestudioio786"){
adminPanel.style.display="block";
}else{
adminPanel.style.display="none";
}
});

/* Load Anime List */
async function loadAnimeList(){

const snap=await getDocs(collection(db,"anime"));

const select=document.getElementById("animeSelect");
select.innerHTML="<option value=''>Select Anime</option>";

snap.forEach(doc=>{
let opt=document.createElement("option");
opt.value=doc.id;
opt.textContent=doc.data().name;
select.appendChild(opt);
});

}

/* Upload Image */
document.getElementById("uploadImgBtn").onclick=()=>{

let widget=cloudinary.createUploadWidget({
cloudName:"dmxqosmk0",
uploadPreset:"asi_anime_upload"
},
(error,result)=>{
if(!error && result && result.event==="success"){
uploadedImage=result.info.secure_url;
document.getElementById("imgText").innerText="Image Uploaded ✅";
}
});

widget.open();

};

/* Add New Anime */
document.getElementById("addAnimeBtn").onclick=async()=>{

let name=document.getElementById("newName").value;
let genre=document.getElementById("newGenre").value;
let link=document.getElementById("newLink").value;

if(!name || !genre || !uploadedImage){
alert("Fill All Fields + Upload Image");
return;
}

await addDoc(collection(db,"anime"),{
name,
genre,
link,
image:uploadedImage,
episodes:[]
});

alert("Anime Added ✅");

};

/* Add Episode */
document.getElementById("saveEpisodeBtn").onclick=async()=>{

let animeId=document.getElementById("animeSelect").value;
let ep=document.getElementById("episode").value;
let link=document.getElementById("episodeLink").value;

if(!animeId || !ep || !link){
alert("Fill All Fields");
return;
}

await updateDoc(doc(db,"anime",animeId),{
episodes:arrayUnion({
ep:ep,
link:link
})
});

document.getElementById("status").innerText="Episode Added ✅";

};

loadAnimeList();

</script>

</body>
</html>
