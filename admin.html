<!DOCTYPE html>
<html>
<head>
<title>ASI Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<h2>Upload Anime</h2>

<input type="text" id="name" placeholder="Anime Name"><br><br>
<input type="text" id="genre" placeholder="Genre"><br><br>
<input type="text" id="link" placeholder="Telegram / Short Link"><br><br>

<input type="file" id="fileInput" accept="image/*"><br><br>

<button onclick="uploadAnime()">Upload</button>

<p id="status"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyA8Z3CvFTL402UF_6zY9v2iWLP8e_kZo1Q",
authDomain:"asi-anime.firebaseapp.com",
projectId:"asi-anime",
storageBucket:"asi-anime.appspot.com",
messagingSenderId:"1029720406470",
appId:"1:1029720406470:web:8ad8ad2d2ea1c7a4725ac7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.uploadAnime = async function(){

let name = document.getElementById("name").value;
let genre = document.getElementById("genre").value;
let link = document.getElementById("link").value;
let file = document.getElementById("fileInput").files[0];

if(!file){
alert("Image select karo");
return;
}

document.getElementById("status").innerText="Uploading...";

let formData = new FormData();
formData.append("file", file);
formData.append("upload_preset","asi_anime_upload");

let res = await fetch(
"https://api.cloudinary.com/v1_1/dmxqosmk0/image/upload",
{
method:"POST",
body:formData
});

let data = await res.json();

await addDoc(collection(db,"anime"),{
name:name,
genre:genre,
link:link,
image:data.secure_url
});

document.getElementById("status").innerText="Upload Successful ✅";

}

</script>

</body>
</html>
