<!DOCTYPE html>
<html>
<head>
<title>ASI Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#121212;
color:white;
text-align:center;
padding:20px;
}

input,select{
padding:12px;
width:80%;
max-width:400px;
margin:8px auto;
border-radius:6px;
border:none;
display:block;
}

button{
padding:12px 20px;
margin:10px;
background:#ff4500;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#e03e00;
}

#status{
color:#0f0;
font-weight:bold;
}
</style>

</head>

<body>

<h2>🔐 ASI Admin Panel</h2>

<!-- Simple Admin Password -->
<input type="password" id="adminPass" placeholder="Enter Password">

<div id="adminPanel" style="display:none">

<h3>Upload Anime / Episode</h3>

<select id="animeSelect">
<option value="">Select Anime</option>
</select>

<input type="text" id="episode" placeholder="Episode Number">
<input type="text" id="link" placeholder="Episode Short Link">

<button id="uploadImgBtn">📸 Upload Poster (Optional)</button>
<p id="imgUrl">No Image Selected</p>

<button id="saveBtn">💾 Save Episode</button>

<p id="status"></p>

</div>

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, arrayUnion } 
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyA8Z3CvFTL402UF_6y9v1iWLP8e_kZo1Q",
authDomain:"asi-anime.firebaseapp.com",
projectId:"asi-anime"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let uploadedImage="";

/* Password Check */
const passInput=document.getElementById("adminPass");
const adminPanel=document.getElementById("adminPanel");

passInput.addEventListener("input",()=>{
if(passInput.value==="Animestudioio786"){
adminPanel.style.display="block";
}else{
adminPanel.style.display="none";
}
});

/* Load Anime List */
async function loadAnimeList(){

const snap=await getDocs(collection(db,"anime"));

const select=document.getElementById("animeSelect");
select.innerHTML="<option value=''>Select Anime</option>";

snap.forEach(doc=>{
let opt=document.createElement("option");
opt.value=doc.id;
opt.textContent=doc.data().name || "Unknown";
select.appendChild(opt);
});

}

/* Upload Image */
document.getElementById("uploadImgBtn").addEventListener("click",()=>{

let widget=cloudinary.createUploadWidget({
cloudName:"dmxqosmk0",
uploadPreset:"asi_anime_upload"
},
(error,result)=>{
if(!error && result && result.event==="success"){
uploadedImage=result.info.secure_url;
document.getElementById("imgUrl").innerText="Image Uploaded ✅";
}
});

widget.open();

});

/* Save Episode */
document.getElementById("saveBtn").addEventListener("click",async()=>{

let animeId=document.getElementById("animeSelect").value;
let episode=document.getElementById("episode").value;
let link=document.getElementById("link").value;

if(!animeId || !episode || !link){
alert("Fill All Fields");
return;
}

try{

document.getElementById("saveBtn").innerText="Saving...";
document.getElementById("saveBtn").disabled=true;

let updateData={
episodes:arrayUnion({
ep:episode,
link:link
})
};

if(uploadedImage){
updateData.image=uploadedImage;
}

await updateDoc(doc(db,"anime",animeId),updateData);

document.getElementById("status").innerText="Episode Added ✅";

document.getElementById("episode").value="";
document.getElementById("link").value="";

}catch(e){
alert("Upload Failed");
console.error(e);
}finally{
document.getElementById("saveBtn").innerText="💾 Save Episode";
document.getElementById("saveBtn").disabled=false;
}

});

loadAnimeList();

</script>

</body>
</html>
