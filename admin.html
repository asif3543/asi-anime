<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASI Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>
</head>

<body>

<div class="admin-container">
<h2 class="admin-title">🔥 ASI Admin Panel</h2>

<div class="box" id="loginBox">
<input type="password" id="adminPass" placeholder="Enter Admin Password">
</div>

<div id="adminPanel" style="display:none">

<!-- ADD ANIME -->
<div class="box">
<h3>Add New Anime</h3>

<input id="newName" placeholder="Anime Name">
<input id="newSeason" placeholder="Season">
<input id="newGenre" placeholder="Genre">

<select id="newType">
<option value="sub">Hindi Sub</option>
<option value="dub">Hindi Dub</option>
</select>

<textarea id="newDesc" placeholder="Description"></textarea>

<button id="uploadImgBtn">📸 Select Image</button>
<p id="imgText" style="text-align:center;color:#ff4500;margin-top:10px;">
No Image Selected
</p>

<button id="addAnimeBtn">Save Anime</button>
</div>

<!-- ADD EPISODE -->
<div class="box">
<h3>Add Episode</h3>

<select id="animeSelect">
<option value="">Select Anime</option>
</select>

<input id="epNum" placeholder="Episode Number">
<input id="epLink" placeholder="Episode Link">

<button id="addEpBtn">Save Episode</button>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
import {
getFirestore, collection, addDoc,
getDocs, doc, updateDoc,
arrayUnion
}
from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

/* FIREBASE CONFIG */
const app = initializeApp({
apiKey:"AIzaSyA8Z3CvFTL402UF_6y9v1iWLP8e_kZo1Q",
authDomain:"asi-anime.firebaseapp.com",
projectId:"asi-anime"
});

const db = getFirestore(app);

let uploadedImage="";

/* LOGIN */
const adminPass=document.getElementById("adminPass");
const adminPanel=document.getElementById("adminPanel");
const loginBox=document.getElementById("loginBox");

adminPass.addEventListener("input",()=>{
if(adminPass.value==="Animestudioio786"){
adminPanel.style.display="block";
loginBox.style.display="none";
loadList();
}
});

/* LOAD ANIME LIST */
async function loadList(){
const snap=await getDocs(collection(db,"anime"));
const animeSelect=document.getElementById("animeSelect");

animeSelect.innerHTML="<option value=''>Select Anime</option>";

let list=[];
snap.forEach(d=>list.push({id:d.id,...d.data()}));
list.sort((a,b)=>(a.name||"").localeCompare(b.name||""));

list.forEach(a=>{
let opt=document.createElement("option");
opt.value=a.id;
opt.textContent=a.name || a.title;
animeSelect.appendChild(opt);
});
}

/* SIMPLE CLOUDINARY UPLOAD */
document.getElementById("uploadImgBtn").onclick=()=>{

let widget=cloudinary.createUploadWidget({
cloudName:"dmxqosmk0",
uploadPreset:"asi_anime_upload",

cropping:false,
multiple:false,
resourceType:"image",
clientAllowedFormats:["jpg","jpeg","png","webp"]

},(error,result)=>{

if(!error && result && result.event==="success"){
uploadedImage=result.info.secure_url;

document.getElementById("imgText").innerText="Image Uploaded ✅";
document.getElementById("imgText").style.color="#00ff00";
}

if(error){
document.getElementById("imgText").innerText="Upload Failed ❌";
document.getElementById("imgText").style.color="red";
console.error(error);
}

});

widget.open();
};

/* ADD ANIME */
document.getElementById("addAnimeBtn").onclick=async()=>{

let name=document.getElementById("newName").value.trim();
let season=document.getElementById("newSeason").value.trim();
let genre=document.getElementById("newGenre").value.trim();
let type=document.getElementById("newType").value;
let desc=document.getElementById("newDesc").value.trim();

if(!name || !uploadedImage){
alert("Fill Name + Upload Image");
return;
}

await addDoc(collection(db,"anime"),{
name,
season,
genre,
type,
description:desc,
image:uploadedImage,
episodes:[],
updatedAt:Date.now()
});

alert("Anime Added ✅");

/* RESET FORM */
document.getElementById("newName").value="";
document.getElementById("newSeason").value="";
document.getElementById("newGenre").value="";
document.getElementById("newDesc").value="";
uploadedImage="";
document.getElementById("imgText").innerText="No Image Selected";
document.getElementById("imgText").style.color="#ff4500";

loadList();
};

/* ADD EPISODE */
document.getElementById("addEpBtn").onclick=async()=>{

let id=document.getElementById("animeSelect").value;
let ep=document.getElementById("epNum").value.trim();
let link=document.getElementById("epLink").value.trim();

if(!id || !ep || !link){
alert("Fill Episode Data");
return;
}

if(!link.match(/^https?:\/\//i)){
link="https://"+link;
}

await updateDoc(doc(db,"anime",id),{
episodes:arrayUnion({ep,link}),
updatedAt:Date.now()
});

alert("Episode Added ✅");

document.getElementById("epNum").value="";
document.getElementById("epLink").value="";
};

</script>
</body>
</html>
