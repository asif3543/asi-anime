<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASI Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>
</head>

<body>

<div class="admin-container">
<h2 class="admin-title">🔥 ASI Admin Panel</h2>

<div class="box" id="loginBox">
<input type="password" id="adminPass" placeholder="Enter Admin Password">
</div>

<div id="adminPanel" style="display:none">

<!-- ADD ANIME -->
<div class="box">
<h3>Add New Anime</h3>

<input id="newName" placeholder="Anime Name">
<input id="newSeason" placeholder="Season">
<input id="newGenre" placeholder="Genre">

<select id="newType">
<option value="sub">Hindi Sub</option>
<option value="dub">Hindi Dub</option>
</select>

<textarea id="newDesc" placeholder="Description"></textarea>

<button id="uploadImgBtn">📸 Select & Crop Image</button>
<p id="imgText" style="text-align:center;color:#ff4500;margin-top:10px;">
No Image Selected
</p>

<button id="addAnimeBtn">Save Anime</button>
</div>

<!-- DELETE -->
<div class="box">
<h3>Delete Anime</h3>

<input id="deleteSearch" placeholder="🔎 Search Anime To Delete">

<div id="deleteResults"
style="background:#121216;border-radius:8px;max-height:150px;overflow-y:auto;margin-top:5px"></div>

<select id="deleteSelect">
<option value="">Select Anime</option>
</select>

<button id="deleteAnimeBtn" style="background:#8b0000;margin-top:10px">
🗑 Delete Anime
</button>
</div>

<!-- EPISODE -->
<div class="box">
<h3>Add Episode</h3>

<input id="animeSearch" placeholder="🔎 Search Anime">

<div id="searchResults"
style="background:#121216;border-radius:8px;max-height:150px;overflow-y:auto"></div>

<select id="animeSelect">
<option value="">Select Anime</option>
</select>

<input id="epNum" placeholder="Episode Number">
<input id="epLink" placeholder="Episode Link">

<button id="addEpBtn">Save Episode</button>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
import {
getFirestore, collection, addDoc,
getDocs, doc, updateDoc,
deleteDoc, arrayUnion
}
from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

/* FIREBASE CONFIG */
const app = initializeApp({
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_AUTH_DOMAIN",
projectId:"YOUR_PROJECT_ID"
});

const db = getFirestore(app);

let animeData=[];
let uploadedImage="";

/* LOGIN */
const adminPass=document.getElementById("adminPass");
const adminPanel=document.getElementById("adminPanel");
const loginBox=document.getElementById("loginBox");

adminPass.addEventListener("input",()=>{
if(adminPass.value==="Animestudioio786"){
adminPanel.style.display="block";
loginBox.style.display="none";
loadList();
}
});

/* LOAD LIST */
async function loadList(){
const snap=await getDocs(collection(db,"anime"));
animeData=[];

const animeSelect=document.getElementById("animeSelect");
const deleteSelect=document.getElementById("deleteSelect");

animeSelect.innerHTML="<option value=''>Select Anime</option>";
deleteSelect.innerHTML="<option value=''>Select Anime</option>";

snap.forEach(d=>animeData.push({id:d.id,...d.data()}));

animeData.sort((a,b)=>a.name.localeCompare(b.name));

animeData.forEach(a=>{
let o1=document.createElement("option");
o1.value=a.id;
o1.textContent=a.name;
animeSelect.appendChild(o1);

let o2=document.createElement("option");
o2.value=a.id;
o2.textContent=a.name;
deleteSelect.appendChild(o2);
});
}

/* IMAGE UPLOAD */
document.getElementById("uploadImgBtn").onclick=()=>{
let widget=cloudinary.createUploadWidget({
cloudName:"dmxqosmk0",
uploadPreset:"asi_anime_upload",
cropping:true,
cropping_aspect_ratio:"2:3"
},(error,result)=>{
if(!error && result && result.event==="success"){
uploadedImage=result.info.secure_url;
document.getElementById("imgText").innerText="Image Uploaded ✅";
document.getElementById("imgText").style.color="#00ff00";
}
});
widget.open();
};

/* SEARCH */
function searchAnime(inputId,resultId,selectId){
document.getElementById(inputId).addEventListener("input",function(){
let val=this.value.toLowerCase();
let box=document.getElementById(resultId);
box.innerHTML="";
if(!val) return;

animeData.filter(a=>a.name.toLowerCase().includes(val))
.forEach(a=>{
let div=document.createElement("div");
div.style.padding="8px";
div.style.cursor="pointer";
div.textContent=a.name;

div.onclick=()=>{
document.getElementById(selectId).value=a.id;
this.value=a.name;
box.innerHTML="";
};

box.appendChild(div);
});
});
}

searchAnime("animeSearch","searchResults","animeSelect");
searchAnime("deleteSearch","deleteResults","deleteSelect");

/* ADD ANIME */
document.getElementById("addAnimeBtn").onclick=async()=>{
let name=newName.value.trim();
if(!name||!uploadedImage){
alert("Fill Name + Upload Image");
return;
}

await addDoc(collection(db,"anime"),{
name,
season:newSeason.value,
genre:newGenre.value,
type:newType.value,
description:newDesc.value,
image:uploadedImage,
episodes:[],
updatedAt:Date.now()
});

alert("Anime Added ✅");
loadList();
};

/* ADD EP */
document.getElementById("addEpBtn").onclick=async()=>{
let id=animeSelect.value;
let ep=epNum.value;
let link=epLink.value;

if(!id||!ep||!link){
alert("Fill Episode Data");
return;
}

if(!link.match(/^https?:\/\//)) link="https://"+link;

await updateDoc(doc(db,"anime",id),{
episodes:arrayUnion({ep,link}),
updatedAt:Date.now()
});

alert("Episode Added ✅");
};

/* DELETE */
document.getElementById("deleteAnimeBtn").onclick=async()=>{
let id=deleteSelect.value;
if(!id) return;

if(confirm("Delete Anime?")){
await deleteDoc(doc(db,"anime",id));
alert("Deleted ✅");
loadList();
}
};

</script>
</body>
</html>
