<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASI Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>

<body style="padding-bottom:20px;">

<div class="admin-container">
<h2 class="admin-title">🔥 ASI Admin Panel</h2>

<div class="box" id="loginBox">
<input type="password" id="adminPass" placeholder="Enter Admin Password">
</div>

<div id="adminPanel" style="display:none">

<!-- ADD NEW ANIME -->
<div class="box">
<h3>Add New Anime</h3>

<input id="newName" placeholder="Anime Name">
<input id="newSeason" placeholder="Season">
<input id="newGenre" placeholder="Genre">

<select id="newType">
<option value="sub">Hindi Sub</option>
<option value="dub">Hindi Dub</option>
</select>

<textarea id="newDesc" placeholder="Description"></textarea>

<button id="addAnimeBtn">Save Anime</button>
</div>

<!-- DELETE ANIME -->
<div class="box">
<h3>Delete Anime</h3>

<input type="text" id="deleteSearch" placeholder="🔎 Search Anime To Delete...">

<div id="deleteResults"
style="background:#121216;border-radius:8px;margin-top:5px;max-height:150px;overflow-y:auto;">
</div>

<select id="deleteSelect" style="margin-top:10px;">
<option value="">Select Anime To Delete</option>
</select>

<button id="deleteAnimeBtn" style="background:#8b0000;margin-top:10px;">
🗑 Delete Selected Anime
</button>
</div>

<!-- ADD EPISODE -->
<div class="box">
<h3>Add Episode</h3>

<input type="text" id="animeSearch" placeholder="🔎 Search Anime...">

<div id="searchResults"
style="background:#121216;border-radius:8px;margin-top:5px;max-height:150px;overflow-y:auto;">
</div>

<select id="animeSelect" style="margin-top:10px;">
<option value="">Select Anime</option>
</select>

<input id="epNum" placeholder="Episode Number">
<input id="epLink" placeholder="Episode Link">

<button id="addEpBtn">Save Episode</button>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
import {
getFirestore, collection, addDoc, getDocs,
doc, updateDoc, deleteDoc, arrayUnion
} from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

/* FIREBASE CONFIG (Tumhara Original) */
const app = initializeApp({
apiKey: "AIzaSyA8Z3CvFTL402UF_6y9v1iWLP8e_kZo1Q",
authDomain: "asi-anime.firebaseapp.com",
projectId: "asi-anime"
});

const db = getFirestore(app);

let animeData = [];

/* LOGIN */
const adminPass = document.getElementById("adminPass");
const adminPanel = document.getElementById("adminPanel");
const loginBox = document.getElementById("loginBox");

adminPass.addEventListener("input",()=>{
if(adminPass.value==="Animestudioio786"){
adminPanel.style.display="block";
loginBox.style.display="none";
loadList();
}
});

/* LOAD ANIME LIST */
async function loadList(){
const snap = await getDocs(collection(db,"anime"));
animeData=[];
document.getElementById("animeSelect").innerHTML="<option value=''>Select Anime</option>";
document.getElementById("deleteSelect").innerHTML="<option value=''>Select Anime</option>";

snap.forEach(d=>animeData.push({id:d.id,...d.data()}));

animeData.sort((a,b)=>a.name.localeCompare(b.name));

animeData.forEach(a=>{
let opt1=document.createElement("option");
opt1.value=a.id;
opt1.textContent=a.name;
document.getElementById("animeSelect").appendChild(opt1);

let opt2=document.createElement("option");
opt2.value=a.id;
opt2.textContent=a.name;
document.getElementById("deleteSelect").appendChild(opt2);
});
}

/* SEARCH ADD EPISODE */
document.getElementById("animeSearch").addEventListener("input",function(){
let val=this.value.toLowerCase();
let resultDiv=document.getElementById("searchResults");
resultDiv.innerHTML="";
if(!val) return;

animeData.filter(a=>a.name.toLowerCase().includes(val))
.forEach(a=>{
let div=document.createElement("div");
div.textContent=a.name;
div.style.padding="8px";
div.style.cursor="pointer";

div.onclick=()=>{
document.getElementById("animeSelect").value=a.id;
this.value=a.name;
resultDiv.innerHTML="";
};

resultDiv.appendChild(div);
});
});

/* SEARCH DELETE */
document.getElementById("deleteSearch").addEventListener("input",function(){
let val=this.value.toLowerCase();
let resultDiv=document.getElementById("deleteResults");
resultDiv.innerHTML="";
if(!val) return;

animeData.filter(a=>a.name.toLowerCase().includes(val))
.forEach(a=>{
let div=document.createElement("div");
div.textContent=a.name;
div.style.padding="8px";
div.style.cursor="pointer";

div.onclick=()=>{
document.getElementById("deleteSelect").value=a.id;
this.value=a.name;
resultDiv.innerHTML="";
};

resultDiv.appendChild(div);
});
});

/* ADD ANIME */
document.getElementById("addAnimeBtn").onclick=async()=>{
let name=document.getElementById("newName").value.trim();
let season=document.getElementById("newSeason").value.trim();
let genre=document.getElementById("newGenre").value.trim();
let type=document.getElementById("newType").value;
let desc=document.getElementById("newDesc").value.trim();

if(!name){alert("Enter Anime Name");return;}

await addDoc(collection(db,"anime"),{
name,season,genre,type,description:desc,episodes:[],updatedAt:Date.now()
});

alert("Anime Added Successfully ✅");
loadList();
};

/* ADD EPISODE */
document.getElementById("addEpBtn").onclick=async()=>{
let id=document.getElementById("animeSelect").value;
let ep=document.getElementById("epNum").value.trim();
let link=document.getElementById("epLink").value.trim();

if(!id||!ep||!link){alert("Fill All Fields");return;}

if(link && !link.match(/^https?:\/\//i)){
link="https://"+link;
}

await updateDoc(doc(db,"anime",id),{
episodes:arrayUnion({ep,link}),
updatedAt:Date.now()
});

alert("Episode Added Successfully ✅");
};

/* DELETE ANIME */
document.getElementById("deleteAnimeBtn").onclick=async()=>{
let id=document.getElementById("deleteSelect").value;
if(!id){alert("Select Anime");return;}

if(confirm("Are you sure you want to delete this anime?")){
await deleteDoc(doc(db,"anime",id));
alert("Anime Deleted Successfully 🗑");
loadList();
}
};

</script>
</body>
</html>
