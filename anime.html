<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Anime - Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px;
            width: 100%;
            background: crimson;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: darkred;
        }

        .episode-box {
            background: #2a2a2a;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h2>Basic Anime Admin Panel</h2>

<div class="container">

    <input type="text" id="title" placeholder="Anime Title">
    <input type="text" id="image" placeholder="Image URL">
    <textarea id="description" placeholder="Anime Description"></textarea>

    <h3>Episodes</h3>
    <div id="episodes"></div>

    <button onclick="addEpisodeField()">Add Episode</button>
    <br><br>
    <button onclick="saveAnime()">Save Anime</button>

</div>

<!-- Firebase -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MSG_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let episodeCount = 0;

    window.addEpisodeField = function () {
        episodeCount++;
        const div = document.createElement("div");
        div.className = "episode-box";
        div.innerHTML = `
            <input type="text" placeholder="Episode ${episodeCount} Title" class="epTitle">
            <input type="text" placeholder="Episode ${episodeCount} Video URL" class="epUrl">
        `;
        document.getElementById("episodes").appendChild(div);
    };

    window.saveAnime = async function () {
        const title = document.getElementById("title").value;
        const image = document.getElementById("image").value;
        const description = document.getElementById("description").value;

        const epTitles = document.querySelectorAll(".epTitle");
        const epUrls = document.querySelectorAll(".epUrl");

        let episodes = [];

        for (let i = 0; i < epTitles.length; i++) {
            episodes.push({
                title: epTitles[i].value,
                url: epUrls[i].value
            });
        }

        try {
            await addDoc(collection(db, "anime"), {
                title: title,
                image: image,
                description: description,
                episodes: episodes
            });

            alert("Anime Added Successfully!");
        } catch (error) {
            alert("Error adding anime");
            console.error(error);
        }
    };
</script>

</body>
</html>
