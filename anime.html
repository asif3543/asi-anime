<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anime Detail</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
background:#121212;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
margin:0;
}

img{
width:250px;
border-radius:10px;
margin-top:20px;
display:none;
object-fit:cover;
box-shadow:0 4px 10px rgba(0,0,0,0.5);
}

button{
padding:12px 20px;
margin-top:20px;
background:#ff4500;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
font-weight:bold;
transition:0.3s;
}

button:hover{
background:#e03e00;
}

button:disabled{
background:#555;
cursor:not-allowed;
}

.info-text{
color:#bbb;
margin-top:10px;
}

#episodeList{
margin-top:30px;
}

.epBtn{
padding:10px 15px;
margin:6px;
background:#ff4500;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<h2 id="animeName">Loading Anime...</h2>

<img id="animeImg">

<p id="animeGenre" class="info-text"></p>
<p id="animeDesc" class="info-text"></p>

<button id="watchBtn" style="display:none;">▶ Watch Anime</button>

<div id="episodeList"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyA8Z3CvFTL402UF_6zY9v2iWLP8e_kZo1Q",
authDomain:"asi-anime.firebaseapp.com",
projectId:"asi-anime"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const params=new URLSearchParams(window.location.search);
const id=params.get("id");

async function loadDetail(){

if(!id){
document.getElementById("animeName").innerText="Anime ID Missing!";
return;
}

try{

const snap=await getDoc(doc(db,"anime",id));

if(!snap.exists()){
document.getElementById("animeName").innerText="Anime Not Found 😢";
return;
}

let data=snap.data();

/* Basic Info */
document.getElementById("animeName").innerText=data.name||"Unknown Anime";

const img=document.getElementById("animeImg");
img.src=data.image||"https://via.placeholder.com/250x350";
img.style.display="inline-block";

document.getElementById("animeGenre").innerText="Genre: "+(data.genre||"Unknown");
document.getElementById("animeDesc").innerText=data.description||"No Description";

/* Watch Button */
const watchBtn=document.getElementById("watchBtn");
watchBtn.style.display="inline-block";

if(data.link){
watchBtn.onclick=()=>{
window.open(data.link,"_blank");
};
}
else{
watchBtn.innerText="Link Not Available";
watchBtn.disabled=true;
}

/* ⭐ Episode System */
const episodeList=document.getElementById("episodeList");

if(data.episodes){

data.episodes.forEach(ep=>{

let btn=document.createElement("button");
btn.className="epBtn";
btn.innerText="Episode "+ep.ep;

btn.onclick=()=>{
window.open(ep.link,"_blank");
};

episodeList.appendChild(btn);

});

}

}catch(error){
console.error(error);
document.getElementById("animeName").innerText="Error Loading Data";
}

}

loadDetail();

</script>

</body>
</html>
