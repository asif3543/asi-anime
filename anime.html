<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASI Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#121212;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.box{
background:#1e1e1e;
padding:20px;
border-radius:10px;
max-width:420px;
margin:auto;
margin-bottom:25px;
}

input,select,textarea{
width:90%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
background:#333;
color:white;
}

button{
padding:12px;
width:90%;
background:#ff4500;
border:none;
border-radius:6px;
color:white;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<h2>🔥 ASI Admin Panel</h2>

<!-- PASSWORD -->
<input type="password" id="adminPass" placeholder="Enter Password">

<div id="adminPanel" style="display:none">

<!-- NEW ANIME -->
<div class="box">
<h3>Add New Anime</h3>

<input id="newName" placeholder="Anime Name">
<input id="newGenre" placeholder="Genre">

<select id="newType">
<option value="sub">Hindi Sub</option>
<option value="dub">Hindi Dub</option>
</select>

<textarea id="newDesc" placeholder="Description"></textarea>

<button id="uploadImgBtn">📸 Select Image</button>
<p id="imgText">No Image Selected</p>

<button id="addAnimeBtn">Save Anime</button>
</div>

<!-- EPISODE -->
<div class="box">
<h3>Add Episode</h3>

<select id="animeSelect"></select>

<input id="epNum" placeholder="Episode Number">
<input id="epLink" placeholder="Episode Link">

<button id="addEpBtn">Save Episode</button>
</div>

</div>

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, arrayUnion } 
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const app=initializeApp({
apiKey:"AIzaSyA8Z3CvFTL402UF_6y9v1iWLP8e_kZo1Q",
authDomain:"asi-anime.firebaseapp.com",
projectId:"asi-anime"
});

const db=getFirestore(app);

let uploadedImage="";

/* PASSWORD */
adminPass.addEventListener("input",()=>{
adminPanel.style.display =
adminPass.value==="Animestudioio786" ? "block" : "none";
});

/* LOAD ANIME LIST */
async function loadList(){
const snap=await getDocs(collection(db,"anime"));

animeSelect.innerHTML="<option>Select Anime</option>";

snap.forEach(d=>{
let opt=document.createElement("option");
opt.value=d.id;
opt.textContent=d.data().name;
animeSelect.appendChild(opt);
});
}

/* IMAGE UPLOAD */
uploadImgBtn.onclick=()=>{

let widget=cloudinary.createUploadWidget({
cloudName:"dmxqosmk0",
uploadPreset:"asi_anime_upload"
},
(error,result)=>{
if(!error && result && result.event==="success"){
uploadedImage=result.info.secure_url;
imgText.innerText="Image Uploaded ✅";
}
});

widget.open();
}

/* ADD NEW ANIME */
addAnimeBtn.onclick=async()=>{

let name=newName.value;
let genre=newGenre.value;
let type=newType.value;
let desc=newDesc.value;

if(!name || !uploadedImage){
alert("Fill Name + Upload Image");
return;
}

await addDoc(collection(db,"anime"),{
name,
genre,
type,
description:desc,
image:uploadedImage,
episodes:[]
});

alert("Anime Added ✅");
loadList();

}

/* ADD EPISODE */
addEpBtn.onclick=async()=>{

let id=animeSelect.value;
let ep=epNum.value;
let link=epLink.value;

if(!id || !ep || !link){
alert("Fill Episode Data");
return;
}

await updateDoc(doc(db,"anime",id),{
episodes:arrayUnion({
ep:ep,
link:link
})
});

alert("Episode Added ✅");

epNum.value="";
epLink.value="";

}

loadList();

</script>

</body>
</html>
