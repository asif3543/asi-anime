<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASI Admin Panel (Anime Editor)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding-bottom: 20px;">

<div class="admin-container">
    <h2 class="admin-title">🔥 ASI Anime Uploader</h2>

    <div class="box" id="loginBox">
        <input type="password" id="adminPass" placeholder="Enter Admin Password">
    </div>

    <div id="adminPanel" style="display:none">

        <!-- NEW ANIME ADDITION -->
        <div class="box">
            <h3>Add New Anime</h3>
            <input id="newName" placeholder="Anime Name">
            <input id="newGenre" placeholder="Genre">
            <select id="newType">
                <option value="sub">Hindi Sub</option>
                <option value="dub">Hindi Dub</option>
            </select>
            <!-- DIRECT LINK BOX -->
            <input id="newLink" placeholder="Direct Anime Link / Shortener (Optional)">
            <textarea id="newDesc" placeholder="Description"></textarea>
            
            <button id="uploadImgBtn" style="background:#333;">📸 Select Image</button>
            <p id="imgText" style="text-align:center; margin-top:10px; font-size:13px; color:#ff4500;">No Image Selected</p>
            
            <button id="addAnimeBtn">Save Anime</button>
        </div>

        <!-- EPISODE ADDITION -->
        <div class="box">
            <h3>Add Episode</h3>
            <select id="animeSelect"></select>
            <input id="epNum" placeholder="Episode Number">
            <input id="epLink" placeholder="Episode Link / Shortener">
            <button id="addEpBtn">Save Episode</button>
        </div>

    </div>
</div>

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, arrayUnion } 
    from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const app = initializeApp({
        apiKey: "AIzaSyA8Z3CvFTL402UF_6y9v1iWLP8e_kZo1Q",
        authDomain: "asi-anime.firebaseapp.com",
        projectId: "asi-anime"
    });

    const db = getFirestore(app);
    let uploadedImage = "";

    adminPass.addEventListener("input", () => {
        if(adminPass.value === "Animestudioio786"){
            document.getElementById("adminPanel").style.display = "block";
            document.getElementById("loginBox").style.display = "none";
        }
    });

    async function loadList(){
        const snap = await getDocs(collection(db, "anime"));
        animeSelect.innerHTML = "<option>Select Anime To Add Episode</option>";
        snap.forEach(d => {
            let opt = document.createElement("option");
            opt.value = d.id;
            opt.textContent = d.data().name;
            animeSelect.appendChild(opt);
        });
    }

    uploadImgBtn.onclick = () => {
        let widget = cloudinary.createUploadWidget({
            cloudName: "dmxqosmk0",
            uploadPreset: "asi_anime_upload"
        }, (error, result) => {
            if(!error && result && result.event === "success"){
                uploadedImage = result.info.secure_url;
                imgText.innerText = "Image Uploaded Successfully ✅";
                imgText.style.color = "#00ff00";
            }
        });
        widget.open();
    }

    addAnimeBtn.onclick = async () => {
        let name = newName.value.trim();
        let genre = newGenre.value.trim();
        let type = newType.value;
        let desc = newDesc.value.trim();
        let aLink = newLink.value.trim();

        if(!name || !uploadedImage){
            alert("Fill Name and Upload Image!"); return;
        }

        if(aLink && !aLink.match(/^https?:\/\//i)) {
            aLink = "https://" + aLink;
        }

        await addDoc(collection(db, "anime"), {
            name: name, genre: genre, type: type, description: desc,
            image: uploadedImage, animeLink: aLink, episodes: []
        });

        alert("Anime Added ✅");
        newName.value = ""; newGenre.value = ""; newDesc.value = ""; newLink.value = "";
        uploadedImage = ""; imgText.innerText = "No Image Selected"; imgText.style.color = "#ff4500";
        loadList();
    }

    addEpBtn.onclick = async () => {
        let id = animeSelect.value;
        let ep = epNum.value.trim();
        let link = epLink.value.trim();

        if(!id || !ep || !link){
            alert("Fill Episode Data!"); return;
        }

        if(link && !link.match(/^https?:\/\//i)) {
            link = "https://" + link;
        }

        await updateDoc(doc(db, "anime", id), {
            episodes: arrayUnion({ ep: ep, link: link })
        });

        alert("Episode Added ✅");
        epNum.value = ""; epLink.value = "";
    }

    loadList();
</script>
</body>
</html>
