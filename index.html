<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASI Anime - Hindi Sub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#121212;
color:white;
font-family:Arial;
margin:0;
}

header{
display:flex;
justify-content:space-between;
padding:15px;
background:#ff4500;
flex-wrap:wrap;
}

.logo{
font-size:22px;
font-weight:bold;
}

.right-menu{
display:flex;
gap:10px;
}

.anime-list{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.anime-card{
width:180px;
margin:12px;
background:#1e1e1e;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.anime-card:hover{
transform:scale(1.05);
}

.anime-card img{
width:100%;
height:230px;
object-fit:cover;
}

.anime-card p{
text-align:center;
margin:5px;
}

.dropdown{
display:none;
position:absolute;
right:20px;
background:#222;
padding:15px;
border-radius:10px;
}

.dropdown a{
display:block;
color:white;
padding:8px;
text-decoration:none;
}

</style>
</head>

<body>

<header>

<div class="logo">ASI Anime</div>

<div class="right-menu">
<input type="text" id="searchInput" placeholder="🔍 Search Anime">
<button onclick="toggleMenu()">⋮</button>
</div>

</header>

<!-- Tree Dot Menu -->
<div class="dropdown" id="dropdownMenu">

<h4>Genres</h4>

<a href="#" onclick="filterGenre('Action')">Action</a>
<a href="#" onclick="filterGenre('Adventure')">Adventure</a>
<a href="#" onclick="filterGenre('Fantasy')">Fantasy</a>
<a href="#" onclick="filterGenre('Isekai')">Isekai</a>
<a href="#" onclick="filterGenre('Romance')">Romance</a>
<a href="#" onclick="filterGenre('Comedy')">Comedy</a>
<a href="#" onclick="filterGenre('Drama')">Drama</a>
<a href="#" onclick="filterGenre('Horror')">Horror</a>
<a href="#" onclick="filterGenre('Mystery')">Mystery</a>
<a href="#" onclick="filterGenre('Thriller')">Thriller</a>
<a href="#" onclick="filterGenre('Superpower')">Superpower</a>
<a href="#" onclick="filterGenre('Supernatural')">Supernatural</a>
<a href="#" onclick="filterGenre('Harem')">Harem</a>
<a href="#" onclick="filterGenre('School')">School</a>

<hr>

<a href="https://t.me/hindisubanime_q" target="_blank">📢 GC Link</a>
<a href="https://t.me/hindisubinganime" target="_blank">📺 Channel Link</a>

</div>

<main class="anime-list" id="animeList"></main>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyA8Z3CvFTL402UF_6zY9v2iWLP8e_kZo1Q",
authDomain:"asi-anime.firebaseapp.com",
projectId:"asi-anime"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let allAnime=[];
const animeList=document.getElementById("animeList");

async function loadAnime(){

const snap=await getDocs(collection(db,"anime"));

snap.forEach(doc=>{
allAnime.push(doc.data());
});

displayAnime(allAnime);
}

function displayAnime(list){

animeList.innerHTML="";

list.forEach(data=>{

let card=document.createElement("div");
card.className="anime-card";

card.innerHTML=`
<img src="${data.image}">
<p>${data.name}</p>
<p>${data.genre}</p>
`;

card.onclick=()=>{
window.open(data.link,"_blank");
};

animeList.appendChild(card);

});

}

document.getElementById("searchInput").addEventListener("input",()=>{
let val=document.getElementById("searchInput").value.toLowerCase();

let filtered=allAnime.filter(a=>
(a.name||"").toLowerCase().includes(val)
);

displayAnime(filtered);
});

window.filterGenre=function(g){

let filtered=allAnime.filter(a=>
(a.genre||"").toLowerCase().includes(g.toLowerCase())
);

displayAnime(filtered);
toggleMenu();
}

window.toggleMenu=function(){
let menu=document.getElementById("dropdownMenu");
menu.style.display = menu.style.display==="block" ? "none":"block";
}

loadAnime();

</script>

</body>
</html>
