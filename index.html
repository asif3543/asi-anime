<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ASI Anime</title>

<meta name="description" content="Watch Hindi Subbed & Dubbed Anime">
<meta name="google-site-verification" content="3LX6AtLTBpFLgq2q6ZCIpMOwJp8ZU1KPcK-u-jUMDk">

<style>

body{
background:#0b0b0e;
color:white;
font-family:Arial;
margin:0;
}

/* Header */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#ff4500;
flex-wrap:wrap;
}

input{
padding:8px;
border-radius:20px;
border:none;
width:200px;
}

/* Filter Buttons */
.filter-box{
display:flex;
gap:10px;
padding:15px;
flex-wrap:wrap;
justify-content:center;
}

.filter-box button{
padding:6px 14px;
border-radius:20px;
border:none;
background:#1e1e1e;
color:white;
cursor:pointer;
}

.filter-box button.active{
background:#ff4500;
}

/* Cards */
.anime-list{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:20px;
padding:25px;
}

.anime-card{
background:#16161e;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.anime-card:hover{
transform:scale(1.05);
}

.anime-card img{
width:100%;
height:230px;
object-fit:cover;
}

.anime-info{
text-align:center;
padding:10px;
}

</style>
</head>

<body>

<header>
<div>ASI Anime</div>
<input id="searchInput" placeholder="Search Anime">
</header>

<!-- Filters -->
<div class="filter-box">
<button onclick="setType('all',this)" class="active">All</button>
<button onclick="setType('sub',this)">Sub</button>
<button onclick="setType('dub',this)">Dub</button>

<button onclick="setGenre('',this)" class="active">All Genre</button>
<button onclick="setGenre('action',this)">Action</button>
<button onclick="setGenre('romance',this)">Romance</button>
<button onclick="setGenre('fantasy',this)">Fantasy</button>
<button onclick="setGenre('comedy',this)">Comedy</button>
<button onclick="setGenre('isekai',this)">Isekai</button>
</div>

<main id="animeList" class="anime-list">
Loading Anime...
</main>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const app=initializeApp({
apiKey:"AIzaSyA8Z3CvFTL402UF_6y9v1iWLP8e_kZo1Q",
authDomain:"asi-anime.firebaseapp.com",
projectId:"asi-anime"
});

const db=getFirestore(app);

let allAnime=[];
let currentType="all";
let currentGenre="";
let currentSearch="";

/* Load Data */
async function loadAnime(){
const snap=await getDocs(collection(db,"anime"));

allAnime=[];
snap.forEach(d=>allAnime.push({id:d.id,...d.data()}));

applyFilter();
}

/* Filter Logic */
function applyFilter(){

let filtered=allAnime.filter(a=>{

let nameMatch=(a.name||"").toLowerCase().includes(currentSearch);
let genreMatch=currentGenre=="" || (a.genre||"").toLowerCase().includes(currentGenre);
let typeMatch=currentType=="all" || (a.type||"sub").toLowerCase()==currentType;

return nameMatch && genreMatch && typeMatch;

});

render(filtered);
}

/* Render Cards */
function render(list){

let box=document.getElementById("animeList");
box.innerHTML="";

if(list.length==0){
box.innerHTML="No Anime Found";
return;
}

list.forEach(a=>{

let card=document.createElement("div");
card.className="anime-card";

card.innerHTML=`
<img src="${a.image}">
<div class="anime-info">
<b>${a.name}</b><br>
<span>${a.genre||""}</span>
</div>
`;

card.onclick=()=>{
location.href="detail.html?id="+a.id;
};

box.appendChild(card);

});

}

/* Filters */
window.setType=function(type,btn){
currentType=type;
document.querySelectorAll(".filter-box button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
applyFilter();
}

window.setGenre=function(genre,btn){
currentGenre=genre.toLowerCase();
applyFilter();
}

/* Search */
searchInput.addEventListener("input",e=>{
currentSearch=e.target.value.toLowerCase();
applyFilter();
});

loadAnime();

</script>

</body>
</html>
