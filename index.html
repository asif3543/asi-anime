<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASI Anime - Hindi Sub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#121212;
color:white;
font-family:Arial;
margin:0;
}

header{
display:flex;
justify-content:space-between;
padding:15px;
background:#ff4500;
flex-wrap:wrap;
gap:10px;
}

.anime-list{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.anime-card{
width:180px;
margin:12px;
background:#1e1e1e;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.anime-card:hover{
transform:scale(1.05);
}

.anime-card img{
width:100%;
height:230px;
object-fit:cover;
}

.anime-card p{
text-align:center;
padding:5px;
margin:0;
}

select,input{
padding:8px;
border-radius:6px;
border:none;
outline:none;
}

</style>
</head>

<body>

<header>
<div>ASI Anime</div>

<input type="text" id="searchInput" placeholder="🔍 Search Anime">

<select id="genreFilter">
<option value="">All Genres</option>
<option>Action</option>
<option>Adventure</option>
<option>Fantasy</option>
<option>Romance</option>
<option>Comedy</option>
<option>Horror</option>
</select>

</header>

<main class="anime-list" id="animeList">
<div>Loading Anime...</div>
</main>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyA8Z3CvFTL402UF_6zY9v2iWLP8e_kZo1Q",
authDomain:"asi-anime.firebaseapp.com",
projectId:"asi-anime",
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const animeList=document.getElementById("animeList");
const searchInput=document.getElementById("searchInput");
const genreFilter=document.getElementById("genreFilter");

let allAnime=[];

async function loadAnime(){

const snap=await getDocs(collection(db,"anime"));

allAnime=[];

snap.forEach(doc=>{
allAnime.push(doc.data());
});

displayAnime(allAnime);
}

function displayAnime(list){

animeList.innerHTML="";

if(list.length===0){
animeList.innerHTML="<p>No Anime Found 😢</p>";
return;
}

list.forEach(data=>{

let card=document.createElement("div");
card.className="anime-card";

let title=data.name || "Unknown";
let genre=data.genre || "Unknown";
let img=data.image || "https://via.placeholder.com/180x230";

card.innerHTML=`
<img src="${img}">
<p>${title}</p>
<p>${genre}</p>
`;

card.onclick=()=>{
if(data.link) window.open(data.link,"_blank");
};

animeList.appendChild(card);

});
}

function applyFilter(){

let search=searchInput.value.toLowerCase();
let genre=genreFilter.value.toLowerCase();

let filtered=allAnime.filter(a=>{
let name=(a.name||"").toLowerCase();
let g=(a.genre||"").toLowerCase();

return name.includes(search) && (genre==="" || g.includes(genre));
});

displayAnime(filtered);
}

searchInput.addEventListener("input",applyFilter);
genreFilter.addEventListener("change",applyFilter);

loadAnime();

</script>

</body>
</html>
