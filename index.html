<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="title" content="ASI Anime | Hindi Sub & Dub Anime Free">
    <meta name="description" content="Watch Hindi Subbed and Dubbed Anime Free Online | ASI Anime Streaming">
    <meta name="keywords" content="anime hindi sub, anime hindi dub, watch anime free, hindi anime, asi anime, anime streaming free">

    <meta property="og:type" content="website">
    <meta property="og:title" content="ASI Anime | Free Anime Streaming">
    <meta property="og:description" content="Watch Latest Hindi Sub & Dub Anime Free">
    <meta property="og:image" content="https://asif3543.github.io/asi-anime/logo.png">
    <meta property="og:url" content="https://asif3543.github.io/asi-anime/">

    <meta name="robots" content="index, follow">
    <meta name="author" content="ASI Anime">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ASI Anime | Premium Anime Streaming</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo">ASI Anime</a>
        <div class="search-box">
            <!-- Search placeholder updated -->
            <input id="searchInput" placeholder="Search Anime or Genre...">
        </div>
    </header>

    <div class="filter-container">
        <!-- Sub / Dub Filter -->
        <button onclick="setType('all',this)" class="active">All Type</button>
        <button onclick="setType('sub',this)">Hindi Sub</button>
        <button onclick="setType('dub',this)">Hindi Dub</button>

        <!-- Genre Filter -->
        <button onclick="setGenre('',this)" class="active">All Genres</button>
        <button onclick="setGenre('action',this)">Action</button>
        <button onclick="setGenre('romance',this)">Romance</button>
        <button onclick="setGenre('fantasy',this)">Fantasy</button>
        <button onclick="setGenre('comedy',this)">Comedy</button>
        <button onclick="setGenre('isekai',this)">Isekai</button>
        <button onclick="setGenre('shonen',this)">Shonen</button>
        <button onclick="setGenre('shojo',this)">Shojo</button>
        <button onclick="setGenre('seinen',this)">Seinen</button>
        <button onclick="setGenre('josei',this)">Josei</button>
        <button onclick="setGenre('Harem',this)"Harem</button>
        <button onclick="setGenre('Reincarnation',this)">Reincarnation</button>
        <button onclick="setGenre('sliceoflife',this)">Slice of Life</button>
        <button onclick="setGenre('horror',this)">Horror</button>
        <button onclick="setGenre('mecha',this)">Mecha</button>
        <button onclick="setGenre('sports',this)">Sports</button>
        <button onclick="setGenre('mystery',this)">Mystery</button>
        <button onclick="setGenre('ecchi',this)">Ecchi</button>
        <button onclick="setGenre('adventure',this)">Adventure</button>
        <button onclick="setGenre('supernatural',this)">Supernatural</button>
        <button onclick="setGenre('scifi',this)">Sci-Fi</button>

    </div>

    <main id="animeList" class="anime-list">
        <h3 style="text-align: center; width: 100%; color: #ff4500;">Loading Anime...</h3>
    </main>

    <!-- GC & Telegram Footer Links -->
    <div class="social-footer">
        <a href="YOUR_TELEGRAM_LINK_HERE" target="_blank" class="btn-tg">✈️ Telegram Channel</a>
        <a href="YOUR_GC_LINK_HERE" target="_blank" class="btn-gc">💬 Join Group Chat</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyA8Z3CvFTL402UF_6y9v1iWLP8e_kZo1Q",
            authDomain: "asi-anime.firebaseapp.com",
            projectId: "asi-anime"
        });

        const db = getFirestore(app);

        let allAnime = [];
        let currentType = "all";
        let currentGenre = "";
        let currentSearch = "";

        async function loadAnime() {
            try {
                const snap = await getDocs(collection(db, "anime"));
                allAnime = [];
                snap.forEach(d => {
                    allAnime.push({ id: d.id, ...d.data() });
                });

                // NEW ANIME YA NEW EPISODE WALA ANIME TOP PE AAYEGA!
                allAnime.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));

                applyFilter();
            } catch (e) {
                document.getElementById("animeList").innerHTML = "<h3 style='text-align:center;width:100%;'>Error loading anime! Check connection.</h3>";
            }
        }

        function applyFilter() {
            let filtered = allAnime.filter(a => {
                // Strings ko pehle se lowercase kar liya aasan matching ke liye
                let nameStr = (a.name || "").toLowerCase();
                let genreStr = (a.genre || "").toLowerCase();

                // 1. FIXED: Search Bar me ab Name ke sath Genre bhi search hoga
                let nameMatch = nameStr.includes(currentSearch) || genreStr.includes(currentSearch);
                
                // 2. FIXED: Button se genre select karne ka logic ab simple aur jyada powerful hai
                let genreMatch = currentGenre === "" || genreStr.includes(currentGenre);
                
                let typeMatch = currentType === "all" || (a.type || "sub").toLowerCase() === currentType;
                
                return nameMatch && genreMatch && typeMatch;
            });
            render(filtered);
        }

        function render(list) {
            let box = document.getElementById("animeList");
            box.innerHTML = "";

            if (list.length == 0) {
                box.innerHTML = "<h3 style='text-align:center;width:100%; color:#a0a0b0;'>No Anime Found matching criteria.</h3>";
                return;
            }

            list.forEach(a => {
                let card = document.createElement("div");
                card.className = "anime-card";

                let imgSrc = a.image || "https://via.placeholder.com/200x250";
                let typeText = a.type ? a.type.toUpperCase() : "SUB";

                card.innerHTML = `
                    <div class="badge-type">${typeText}</div>
                    <img src="${imgSrc}">
                    <div class="anime-info">
                        <h4>${a.name || "Unknown"}</h4>
                        <span class="genre-tag">${a.genre || "No Genre"}</span>
                    </div>
                `;

                card.onclick = () => {
                    // PHOTO PE CLICK KARTE HI SEEDHA DETAIL PAGE KHULEGA
                    location.href = "detail.html?id=" + a.id;
                };

                box.appendChild(card);
            });
        }

        window.setType = function(type, btn) {
            currentType = type;
            document.querySelectorAll(".filter-container button").forEach(b => {
                if(b.innerText.includes("Sub") || b.innerText.includes("Dub") || b.innerText.includes("Type")) b.classList.remove("active");
            });
            btn.classList.add("active");
            applyFilter();
        }

        window.setGenre = function(genre, btn) {
            currentGenre = genre.toLowerCase();
            document.querySelectorAll(".filter-container button").forEach(b => {
                if(!b.innerText.includes("Sub") && !b.innerText.includes("Dub") && !b.innerText.includes("Type")) b.classList.remove("active");
            });
            btn.classList.add("active");
            applyFilter();
        }

        document.getElementById("searchInput").addEventListener("input", e => {
            currentSearch = e.target.value.toLowerCase().trim();
            applyFilter();
        });

        loadAnime();
    </script>
</body>
</html>
