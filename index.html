<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="title" content="ASI Anime | Hindi Sub & Dub Anime Free">
    <meta name="description" content="Watch Hindi Subbed and Dubbed Anime Free Online | ASI Anime Streaming">
    <meta name="keywords" content="anime hindi sub, anime hindi dub, watch anime free, hindi anime, asi anime, anime streaming free">
    <meta name="google-site-verification" content="3LX6AtLTBpFLgq2qg6ZCIpMOwJp8ZU1KPcK-u-jUMDk" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ASI Anime | Premium Anime Streaming</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Sidebar Menu (Hidden by default) -->
    <div id="sidebar" class="sidebar">
        <a href="javascript:void(0)" class="close-btn" onclick="closeNav()">×</a>
        <div class="sidebar-content">
            
            <!-- Genres Filter Section -->
            <div id="genre-filter-section">
                 <h3>Select Genres</h3>
                 <div id="genre-list-sidebar" class="genre-list-sidebar">
                    <!-- Checkboxes for genres will be populated here by JS -->
                 </div>
                 <button id="applyGenreFilterBtn">Done ✅</button>
            </div>
            
            <hr>
            
            <!-- All Anime List -->
            <div id="all-anime-list-menu">
                <h3>All Anime List</h3>
                <a href="#" onclick="showAzList('sub')">Hindi Sub (A-Z)</a>
                <a href="#" onclick="showAzList('dub')">Hindi Dub (A-Z)</a>
            </div>
        </div>
    </div>
    <div id="overlay" onclick="closeNav()"></div>

    <header>
        <div class="header-left">
            <span class="menu-icon" onclick="openNav()">☰</span>
            <a href="index.html" class="logo">ASI Anime</a>
        </div>
        <div class="search-box">
            <input id="searchInput" placeholder="Search Anime...">
        </div>
    </header>

    <div class="filter-container">
        <!-- Sub / Dub Filter -->
        <button onclick="setType('all',this)" class="active">All</button>
        <button onclick="setType('sub',this)">Hindi Sub</button>
        <button onclick="setType('dub',this)">Hindi Dub</button>
    </div>

    <!-- Main Anime Grid -->
    <main id="animeList" class="anime-list">
        <h3 style="text-align: center; width: 100%; color: #ff4500;">Loading Anime...</h3>
    </main>
    
    <!-- A-Z List View (Hidden by default) -->
    <div id="azListView" class="az-list-view" style="display: none;">
        <button class="back-to-home-btn" onclick="showHome()">⬅️ Back to Home</button>
        <h2 id="azListTitle"></h2>
        <div id="az-alphabet-box" class="az-alphabet-box"></div>
        <div id="az-results" class="az-results">
            <p>Select an alphabet to see the list.</p>
        </div>
    </div>

    <!-- Social Footer Links -->
    <div class="social-footer">
        <a href="YOUR_TELEGRAM_LINK_HERE" target="_blank" class="btn-tg">✈️ Telegram Channel</a>
        <a href="YOUR_GC_LINK_HERE" target="_blank" class="btn-gc">💬 Join Group Chat</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyA8Z3CvFTL402UF_6y9v1iWLP8e_kZo1Q",
            authDomain: "asi-anime.firebaseapp.com",
            projectId: "asi-anime"
        });
        const db = getFirestore(app);

        let allAnime = [];
        let currentType = "all";
        let selectedGenres = []; // Array to store selected genres
        let currentSearch = "";

        // --- Sidebar Navigation ---
        window.openNav = () => {
            document.getElementById("sidebar").style.width = "250px";
            document.getElementById("overlay").style.display = "block";
        }
        window.closeNav = () => {
            document.getElementById("sidebar").style.width = "0";
            document.getElementById("overlay").style.display = "none";
        }

        // --- View Management ---
        window.showHome = () => {
            document.getElementById("animeList").style.display = "grid";
            document.getElementById("azListView").style.display = "none";
            document.querySelector(".filter-container").style.display = "flex";
            applyFilter();
        }

        async function loadAnime() {
            try {
                const snap = await getDocs(collection(db, "anime"));
                allAnime = [];
                snap.forEach(d => allAnime.push({ id: d.id, ...d.data() }));
                allAnime.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
                
                populateGenres();
                applyFilter();
            } catch (e) {
                document.getElementById("animeList").innerHTML = "<h3 style='text-align:center;width:100%;'>Error loading anime!</h3>";
            }
        }
        
        function populateGenres() {
            const genresSet = new Set();
            allAnime.forEach(a => {
                if (a.genre) {
                    // Split by comma or space to get individual genres
                    a.genre.replace(/,/g, ' ').split(/\s+/).forEach(g => {
                        if (g) genresSet.add(g.trim().toLowerCase());
                    });
                }
            });

            const genreContainer = document.getElementById("genre-list-sidebar");
            genreContainer.innerHTML = '';
            
            [...genresSet].sort().forEach(genre => {
                 const label = document.createElement('label');
                 const checkbox = document.createElement('input');
                 checkbox.type = 'checkbox';
                 checkbox.value = genre;
                 const text = document.createElement('span');
                 text.textContent = genre.charAt(0).toUpperCase() + genre.slice(1);
                 
                 label.appendChild(checkbox);
                 label.appendChild(text);
                 genreContainer.appendChild(label);
            });
        }
        
        // --- Main Filtering Logic ---
        function applyFilter() {
            let filtered = allAnime.filter(a => {
                const nameStr = (a.name || "").toLowerCase();
                const genreStr = (a.genre || "").toLowerCase();
                const searchStr = currentSearch.toLowerCase();

                // 1. Search filter
                const nameMatch = nameStr.includes(searchStr);
                
                // 2. Genre filter (must contain ALL selected genres)
                const genreMatch = selectedGenres.length === 0 || selectedGenres.every(g => genreStr.includes(g));

                // 3. Type filter (Sub/Dub)
                const typeMatch = currentType === "all" || (a.type || "sub").toLowerCase() === currentType;
                
                return nameMatch && genreMatch && typeMatch;
            });
            render(filtered);
        }

        function render(list) {
            let box = document.getElementById("animeList");
            box.innerHTML = "";

            if (list.length === 0) {
                box.innerHTML = "<h3 style='text-align:center;width:100%; color:#a0a0b0;'>No Anime Found.</h3>";
                return;
            }

            list.forEach(a => {
                let card = document.createElement("div");
                card.className = "anime-card";
                let imgSrc = a.image || "https://via.placeholder.com/200x250";
                let typeText = a.type ? a.type.toUpperCase() : "SUB";

                card.innerHTML = `
                    <div class="badge-type">${typeText}</div>
                    <img src="${imgSrc}" alt="${a.name}">
                    <div class="anime-info">
                        <h4>${a.name || "Unknown"}</h4>
                        <span class="genre-tag">${a.genre || "No Genre"}</span>
                    </div>
                `;
                card.onclick = () => location.href = "detail.html?id=" + a.id;
                box.appendChild(card);
            });
        }
        
        // Event listener for the "Done" button in the sidebar
        document.getElementById("applyGenreFilterBtn").onclick = () => {
            selectedGenres = [];
            const checkboxes = document.querySelectorAll('#genre-list-sidebar input[type="checkbox"]:checked');
            checkboxes.forEach(cb => {
                selectedGenres.push(cb.value);
            });
            closeNav();
            showHome(); // This calls applyFilter internally
        };

        window.setType = (type, btn) => {
            currentType = type;
            document.querySelectorAll(".filter-container button").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            applyFilter();
        }

        searchInput.addEventListener("input", e => {
            currentSearch = e.target.value.trim();
            applyFilter();
        });
        
        // --- A-Z List Logic (unchanged) ---
        window.showAzList = (type) => {
            closeNav();
            document.getElementById("animeList").style.display = "none";
            document.querySelector(".filter-container").style.display = "none";
            document.getElementById("azListView").style.display = "block";
            
            const title = type === 'sub' ? 'Hindi Sub Anime (A-Z)' : 'Hindi Dub Anime (A-Z)';
            document.getElementById("azListTitle").textContent = title;
            
            const alphabetBox = document.getElementById("az-alphabet-box");
            alphabetBox.innerHTML = '';
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(letter => {
                let btn = document.createElement('button');
                btn.textContent = letter;
                btn.onclick = () => renderAzResults(type, letter);
                alphabetBox.appendChild(btn);
            });
            
            document.getElementById("az-results").innerHTML = "<p>Select an alphabet to see the list.</p>";
        };
        
        window.renderAzResults = (type, letter) => {
             document.querySelectorAll('#az-alphabet-box button').forEach(b => b.classList.remove('active'));
             event.target.classList.add('active');

            const resultsBox = document.getElementById("az-results");
            resultsBox.innerHTML = '';
            
            const filtered = allAnime
                .filter(a => a.type === type && a.name.toUpperCase().startsWith(letter))
                .sort((a,b) => a.name.localeCompare(b.name));
            
            if(filtered.length === 0) {
                resultsBox.innerHTML = '<p>No anime found starting with this letter.</p>';
                return;
            }
            
            filtered.forEach(a => {
                let p = document.createElement('a');
                p.className = 'az-result-item';
                p.textContent = a.name;
                p.href = `detail.html?id=${a.id}`;
                resultsBox.appendChild(p);
            });
        };

        loadAnime();
    </script>
</body>
</html>
