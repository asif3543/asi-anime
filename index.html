<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>ASI Anime | Hindi Subbed Anime Watch Online</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- SEO -->
<meta name="description" content="Watch Hindi Subbed Anime Online - ASI Anime">
<meta name="robots" content="index, follow">

<!-- Google Verification -->
<meta name="google-site-verification" content="3LX6AtLTBpFLgq2q6ZCIpMOwJp8ZU1KPcK-u-jUMDk" />

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
margin:0;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#ff4500;
flex-wrap:wrap;
}

.logo{
font-size:24px;
font-weight:bold;
}

input{
padding:10px;
border-radius:6px;
border:none;
width:220px;
}

.anime-list{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
padding:20px;
}

.anime-card{
background:#1c1c1c;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.anime-card:hover{
transform:scale(1.05);
}

.anime-card img{
width:100%;
height:220px;
object-fit:cover;
display:block;
}

.anime-card p{
text-align:center;
margin:6px;
font-size:14px;
}

.loading{
text-align:center;
padding:40px;
color:#aaa;
}

</style>

</head>

<body>

<header>
<div class="logo">ASI Anime</div>

<input type="text" id="searchInput" placeholder="🔍 Search Anime">

</header>

<main id="animeList">
<div class="loading">Loading Anime...</div>
</main>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyA8Z3CvFTL402UF_6y9v1iWLP8e_kZo1Q",
authDomain:"asi-anime.firebaseapp.com",
projectId:"asi-anime"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let allAnime=[];
const animeList=document.getElementById("animeList");

/* Load Anime */
async function loadAnime(){

const snap=await getDocs(collection(db,"anime"));

allAnime=[];
snap.forEach(doc=>{
allAnime.push({id:doc.id,...doc.data()});
});

renderAnime(allAnime);
}

/* Display Cards */
function renderAnime(list){

animeList.innerHTML="";

if(list.length===0){
animeList.innerHTML="<h3 style='text-align:center'>No Anime Found 😢</h3>";
return;
}

list.forEach(data=>{

let card=document.createElement("div");
card.className="anime-card";

card.innerHTML=`
<img loading="lazy" src="${data.image || 'https://via.placeholder.com/200'}">
<p><b>${data.name || "Unknown"}</b></p>
<p style="color:#aaa">${data.genre || ""}</p>
`;

card.onclick=()=>{
window.location.href="anime.html?id="+data.id;
};

animeList.appendChild(card);

});

}

/* Search Fix */
document.getElementById("searchInput").addEventListener("input",e=>{

let val=e.target.value.toLowerCase();

let filtered=allAnime.filter(a=>
(a.name||"").toLowerCase().includes(val) ||
(a.genre||"").toLowerCase().includes(val)
);

renderAnime(filtered);

});

loadAnime();

</script>

</body>
</html>
